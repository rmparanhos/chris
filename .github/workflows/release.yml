name: Release

# Publica o instalador do Windows ao empurrar uma tag tipo v0.1.0
# (ou rodando manualmente em Actions -> Release -> Run workflow).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build + bundle + publicar release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: companiond
          tagName: ${{ github.ref_name }}
          releaseName: "CHRIS ${{ github.ref_name }}"
          releaseBody: "Instalador do CHRIS para Windows — baixe o .msi ou o .exe (NSIS) abaixo."
          releaseDraft: false
          prerelease: false
