<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHRIS — approval</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="card" data-risk="low">
      <header data-tauri-drag-region>
        <span id="risk" class="risk">LOW</span>
        <span id="agent" class="agent">Copilot</span>
      </header>

      <div id="tool" class="tool">shell</div>
      <pre id="summary" class="summary">(command)</pre>
      <div id="cwd" class="cwd"></div>

      <footer>
        <button id="defer" class="defer" title="Step aside — approve in the terminal instead">Terminal</button>
        <button id="deny" class="deny" title="Deny (Esc)">Deny</button>
        <button id="allow" class="allow" title="Allow (Enter)">Allow</button>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
