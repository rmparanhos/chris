<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHRIS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- data-state controls the appearance: idle | alert | approved | denied | pr
         data-sprite picks the character: blob | cat | dog
         Dragging is handled in blob.js (startDragging on mousedown), so it works
         when you grab the character itself, not just the empty edges. -->
    <div id="stage" data-state="idle" data-sprite="blob">
      <div id="badge" hidden>+0</div>

      <!-- simple PR notification above the companion: your open PRs · reviews
           requested of you. Hidden until there is something to show. -->
      <div id="prcount" hidden>
        <span title="Open pull requests you authored"><b id="pr-open">0</b> open</span>
        <span class="dot">·</span>
        <span title="Pull requests that requested your review"><b id="pr-review">0</b> review</span>
      </div>

      <div id="blob" title="Click to preview the states">
        <!-- ===== Sprite 1: Blob ===== -->
        <svg id="sprite-blob" class="sprite" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <ellipse class="body" cx="50" cy="56" rx="36" ry="33" />

          <!-- eyes -->
          <circle class="eye" cx="40" cy="50" r="4.5" />
          <circle class="eye" cx="60" cy="50" r="4.5" />

          <!-- mouths: only one is visible per state (via CSS) -->
          <path class="mouth neutral" d="M42 66 H58" />
          <path class="mouth smile" d="M41 64 Q50 74 59 64" />
          <path class="mouth frown" d="M41 70 Q50 62 59 70" />
          <circle class="mouth o" cx="50" cy="67" r="4" />

          <!-- emote shown on alert -->
          <text class="emote" x="78" y="26">!</text>
        </svg>

        <!-- ===== Sprite 2: Cat ===== (same .body/.eye/.mouth/.emote classes,
             so all of the state/animation logic works without any changes) -->
        <svg id="sprite-cat" class="sprite" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- ears (follow the state color, via the .ear class) -->
          <path class="ear" d="M30 34 L40 12 L52 32 Z" />
          <path class="ear" d="M48 32 L60 12 L70 34 Z" />
          <path class="ear-inner" d="M36 31 L41 19 L47 30 Z" />
          <path class="ear-inner" d="M53 30 L59 19 L64 31 Z" />

          <ellipse class="body" cx="50" cy="56" rx="36" ry="33" />

          <circle class="eye" cx="40" cy="50" r="4.5" />
          <circle class="eye" cx="60" cy="50" r="4.5" />

          <!-- nose + whiskers -->
          <path class="cat-nose" d="M47 60 L53 60 L50 64 Z" />
          <g class="whiskers">
            <path d="M53 61 H73" />
            <path d="M53 63 L73 66" />
            <path d="M47 61 H27" />
            <path d="M47 63 L27 66" />
          </g>

          <!-- mouths (same classes as the blob) -->
          <path class="mouth neutral" d="M42 68 H58" />
          <path class="mouth smile" d="M41 66 Q50 75 59 66" />
          <path class="mouth frown" d="M41 72 Q50 64 59 72" />
          <circle class="mouth o" cx="50" cy="69" r="3.5" />

          <text class="emote" x="80" y="28">!</text>
        </svg>

        <!-- ===== Image-based character (PNG, one file per state) =====
             Used by photo sprites like "dog". If the files aren't present yet,
             blob.js falls back to the blob SVG above. -->
        <img id="sprite-photo" class="sprite" alt="" />

        <!-- ===== Rive-powered dog (optional) =====
             If sprites/dog/dog.riv exists, dog-rive.js renders the dog here with
             real chest breathing + per-state reactions and hides the PNG above.
             Missing .riv -> this stays blank and the PNGs are used. -->
        <canvas id="dog-rive" class="sprite"></canvas>
      </div>

      <!-- character picker (appears on hover) -->
      <div id="picker" data-tauri-drag-region="false">
        <button type="button" data-sprite="blob" class="active" title="Blob">🫧</button>
        <button type="button" data-sprite="cat" title="Cat">🐱</button>
        <button type="button" data-sprite="dog" title="Dog">🐶</button>
      </div>
    </div>

    <script src="vendor/rive.js"></script>
    <script src="dog-rive.js"></script>
    <script src="blob.js"></script>
  </body>
</html>
