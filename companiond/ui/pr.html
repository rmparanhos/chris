<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHRIS — Pull Request</title>
    <link rel="stylesheet" href="pr.css" />
  </head>
  <body>
    <div id="card">
      <header>
        <span class="tag">PULL REQUEST</span>
        <span id="repo" class="repo">owner/repo #0</span>
      </header>

      <div id="title" class="title">(título do PR)</div>
      <div id="author" class="author">por alguém</div>

      <footer>
        <button id="dismiss" class="dismiss">Dispensar</button>
        <button id="open" class="open">Abrir</button>
        <button id="approve" class="approve">Aprovar</button>
      </footer>
      <div id="status" class="status"></div>
    </div>

    <script src="pr.js"></script>
  </body>
</html>
